name: Publish Release

on:
  push:
    tags:
      - 'v*'  # Only trigger on version tags
  workflow_dispatch:  # Manual trigger

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get tag name
      id: tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Zimmerman Framework ${{ steps.tag.outputs.tag }}
        body: |
          ## First-Principles Derivation of Z = 2√(8π/3)

          ### The Core Result
          ```
          Z = 2√(8π/3) = 5.7888

          Derived from:
          - √(8π/3) from Friedmann equation: ρc = 3H²/(8πG)
          - Factor 2 from horizon mass: M = c³/(2GH)
          ```

          ### Derived Constants
          | Constant | Formula | Accuracy |
          |----------|---------|----------|
          | α | 1/(4Z² + 3) | 0.004% |
          | a₀ | cH₀/Z | 2% |
          | Ω_Λ | √(3π/2)/(1+√(3π/2)) | 0.06% |

          ### Testable Prediction
          ```
          a₀(z) = a₀(0) × E(z)
          ```
          Observable with JWST high-z kinematics.

          ---
          See `HORIZON_CALCULATION.md` for full derivation.
        files: |
          HORIZON_CALCULATION.md
          COMPLETE_DERIVATIONS_GUIDE.md
          README.md
          papers/*.md
          Zimmerman_Complete_Framework.pdf
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
