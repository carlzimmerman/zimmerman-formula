name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Zimmerman Framework ${{ github.ref_name }}
        body: |
          ## First-Principles Derivation of Z = 2√(8π/3)

          ### The Core Result
          ```
          Z = 2√(8π/3) = 5.7888

          Derived from:
          - √(8π/3) from Friedmann equation
          - Factor 2 from horizon mass
          ```

          ### Derived Constants
          | Constant | Formula | Accuracy |
          |----------|---------|----------|
          | α | 1/(4Z² + 3) | 0.004% |
          | a₀ | cH₀/Z | 2% |
          | Ω_Λ | √(3π/2)/(1+√(3π/2)) | 0.06% |

          ### Testable Prediction
          a₀(z) = a₀(0) × E(z) — observable with JWST

          ---
          Full derivation: HORIZON_CALCULATION.md
        files: |
          HORIZON_CALCULATION.md
          README.md
        draft: false
        prerelease: false
